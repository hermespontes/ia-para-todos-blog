title: IA para Todos
description: IA prática para quem não é técnico
baseurl: "/ia-para-todos-blog"
url: "https://hermespontes.github.io"
theme: minima
lang: pt-BR
markdown: kramdown
plugins:
  - jekyll-feed

# Evita que saídas técnicas apareçam como páginas/menu
exclude:
  - agents/out
  - README.md

# Define menu superior manualmente (somente páginas públicas)
header_pages:
  - index.md
  - agents/README.md
